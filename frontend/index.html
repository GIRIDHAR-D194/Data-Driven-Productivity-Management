<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color:red;font-size:20px;padding:20px;">ERROR: ' + event.message + '<br>' + event.filename + ':' + event.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red;font-size:20px;padding:20px;">PROMISE ERROR: ' + event.reason + '</div>';
      });
    </script>
  </body>
</html>
